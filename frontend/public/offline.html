<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | Bookworm Mumbai</title>
    <style>
        body {
            background-color: #f5f3ee;
            color: #000;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .brutal-card {
            border: 4px solid black;
            box-shadow: 8px 8px 0 black;
            background: white;
            padding: 40px;
            max-width: 500px;
        }
        h1 { font-size: 3rem; margin-bottom: 10px; text-transform: uppercase; font-weight: 900; }
        p { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; }
        .btn {
            display: inline-block;
            background: #2f855a;
            color: white;
            border: 3px solid black;
            box-shadow: 4px 4px 0 black;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="brutal-card">
        <h1>OFFLINE</h1>
        <p>You're disconnected from the city library. Check your network to continue reading.</p>
        <a href="/" class="btn">Retry Connection</a>
    </div>
</body>
</html>
